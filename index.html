<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>50 Milliós Játszma - Smooth + Chat limit</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{
  --deep:#050027;--blue:#07108c;--cyan:#26f6ff;--gold:#ffd76a;--orange:#ff9e2c;--red:#ef233c;--green:#10e26f;--glass:rgba(255,255,255,.10);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{min-height:100vh;overflow:hidden;color:#fff;background:radial-gradient(circle at 50% 10%,#1727df 0%,#07005d 45%,#020018 100%)}
body:after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(90deg,transparent 0 115px,rgba(255,255,255,.025) 116px 117px),radial-gradient(circle at 50% 0,rgba(255,255,255,.11),transparent 38%);pointer-events:none}
.main{position:relative;z-index:1;display:grid;grid-template-columns:280px 1fr 280px;height:100vh;gap:16px;padding:16px}.panel{background:linear-gradient(180deg,rgba(7,16,140,.66),rgba(5,0,39,.82));border:1px solid rgba(38,246,255,.28);box-shadow:0 12px 28px rgba(0,0,0,.28),inset 0 0 14px rgba(255,255,255,.05);border-radius:28px}
.left,.right{padding:18px;overflow:hidden}.left h1,.sideTitle{text-align:center;margin-bottom:14px;letter-spacing:2px;text-shadow:0 0 18px var(--cyan)}
#chatWall{height:calc(100vh - 96px);overflow:auto;padding-right:4px;contain:content}.msg{background:linear-gradient(135deg,rgba(255,255,255,.94),rgba(166,239,255,.92));color:#050027;padding:12px 14px;border-radius:18px;margin-bottom:10px;box-shadow:0 6px 12px rgba(0,0,0,.22);animation:pop .22s ease}.msg b{display:block;color:#0a0c8f;margin-bottom:4px}.msg small{opacity:.65}
.center{position:relative;padding:16px 24px 92px}.logo{width:340px;height:126px;margin:0 auto;background:radial-gradient(circle,#fff4aa 0%,#ffd100 45%,#be6b00 100%);border:6px solid #fff1a5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;color:#1a0b00;text-shadow:0 2px #fff7bd;box-shadow:0 0 24px rgba(255,215,0,.8);}.logo span{font-size:26px;display:block;text-align:center}.question{width:min(980px,82%);margin:24px auto 0;background:linear-gradient(180deg,#f4ffff,#a7f8ff);color:#04004a;padding:28px 34px;font-size:clamp(26px,3vw,42px);font-weight:900;border-radius:28px;text-align:center;border:4px solid #fff;box-shadow:0 12px 30px rgba(0,0,0,.32),0 0 14px rgba(38,246,255,.55)}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:24px}.answer{height:210px;position:relative;overflow:hidden;cursor:pointer;border-radius:30px;border:4px solid rgba(255,255,255,.75);background:linear-gradient(145deg,#dfffff,#80efff 55%,#1274ff);box-shadow:0 12px 24px rgba(0,0,0,.30),inset 0 0 16px rgba(255,255,255,.45);transition:.2s transform,.2s filter;will-change:transform}.answer:hover{transform:translateY(-4px) scale(1.01)}.answer h2{position:relative;z-index:2;text-align:center;margin:15px 12px 6px;color:#030047;font-size:30px;text-shadow:0 1px white}.cash{position:absolute;left:10px;right:10px;top:62px;bottom:62px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;font-size:40px;filter:drop-shadow(0 4px 3px rgba(0,0,0,.28));transition:.18s;pointer-events:none}.bundle{display:inline-block;will-change:transform}.amount{position:absolute;z-index:3;left:16px;bottom:12px;transform:none;min-width:98px;text-align:center;background:linear-gradient(#fff7b3,#ffd000 50%,#bd7900);color:#1d0e00;padding:9px 18px;border-radius:16px;font-size:24px;font-weight:900;border:2px solid #fff4ac;box-shadow:0 4px 10px rgba(0,0,0,.22)}.ctrl{position:absolute;z-index:3;bottom:12px;right:16px;left:auto;transform:none;display:flex;gap:10px}.ctrl button,.okBtn,.audBtn{border:0;border-radius:16px;background:linear-gradient(#fff3a0,#ffc400,#ff8a00);color:#150900;font-weight:900;box-shadow:0 6px 0 #8a4d00;cursor:pointer;transition:.16s}.ctrl button{width:56px;height:35px;font-size:22px}.ctrl button:active,.okBtn:active,.audBtn:active{transform:translateY(5px);box-shadow:0 2px 0 #8a4d00}.okBtn{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);padding:19px 76px;font-size:28px;letter-spacing:1px}.okBtn:active{transform:translateX(-50%) translateY(5px)}
.correct{background:linear-gradient(145deg,#eaffef,#10e26f 55%,#036b31)!important;animation:correctPulse .7s ease-in-out infinite alternate;color:white}.wrong{background:linear-gradient(145deg,#ffdde2,#ef233c 55%,#770014)!important;color:#fff;filter:saturate(1.2)}.wrong h2,.correct h2{color:white;text-shadow:0 2px 8px #000}.hiddenAnswer{opacity:.22;filter:grayscale(1);pointer-events:none}.chickenPick{outline:5px solid var(--gold);box-shadow:0 0 20px rgba(255,215,0,.75)}.chickenBadge{position:absolute;top:12px;right:12px;z-index:4;font-size:34px;filter:drop-shadow(0 4px 3px #000)}.lostMoney:after{content:'✕';position:absolute;z-index:5;inset:0;display:flex;align-items:center;justify-content:center;font-size:118px;font-weight:900;color:rgba(255,0,35,.92);text-shadow:0 5px 14px rgba(0,0,0,.65),0 0 10px #fff;pointer-events:none;animation:xPop .25s ease}.locked .answer,.locked .ctrl button{pointer-events:none}
.q{padding:13px 14px;margin-bottom:9px;border-radius:15px;color:white;font-weight:800;box-shadow:inset 0 0 15px rgba(255,255,255,.08)}.future{background:#07106a}.current{background:linear-gradient(90deg,#707bff,#26f6ff);color:#050027}.red{background:linear-gradient(90deg,#790015,#ef233c)}.green{background:linear-gradient(90deg,#006729,#10e26f);color:#03170b}.balance{text-align:center;margin:16px 0;padding:16px;border-radius:24px;background:rgba(0,0,0,.25)}.money{font-size:54px}.bankLabel{font-size:13px;letter-spacing:2px;color:#aefcff}#bank{font-size:42px;color:var(--gold);font-weight:900;text-shadow:0 0 18px gold}.circle{margin:16px auto 0;width:205px;height:205px;border-radius:50%;border:5px solid #fff0a1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;box-shadow:0 0 28px gold;background:#000}.part{background:linear-gradient(145deg,#e9fbff,#67eaff);display:flex;justify-content:center;align-items:center;font-size:45px;border:2px solid #050027;cursor:pointer;transition:.22s}.part:hover{transform:scale(1.06);filter:brightness(1.15)}.part.used{background:#333;color:#111;opacity:.45;pointer-events:none;filter:grayscale(1)}
.toast{position:fixed;z-index:20;top:18px;left:50%;transform:translateX(-50%);padding:13px 22px;border-radius:999px;background:rgba(5,0,39,.88);border:1px solid rgba(38,246,255,.6);box-shadow:0 10px 24px rgba(0,0,0,.28);font-weight:800;opacity:0;transition:.3s}.toast.show{opacity:1}.confetti{position:fixed;z-index:999999!important;width:14px;height:22px;top:-40px;animation:megaFall linear forwards;pointer-events:none;will-change:transform,opacity;border-radius:3px}.endOverlay{position:fixed;z-index:60;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.30);}.endCard{width:min(720px,90vw);padding:55px 30px;border-radius:38px;text-align:center;border:4px solid rgba(255,255,255,.85);box-shadow:0 22px 55px rgba(0,0,0,.45);animation:endPop .45s ease}.endCard.lost{background:linear-gradient(135deg,rgba(239,35,60,.84),rgba(80,0,15,.84))}.endCard.won{background:linear-gradient(135deg,rgba(16,226,111,.84),rgba(0,82,35,.84))}.endCard h1{font-size:clamp(48px,8vw,86px);letter-spacing:3px;text-shadow:0 4px 12px rgba(0,0,0,.45);margin-bottom:12px}.endCard p{font-size:28px;font-weight:900;margin-bottom:28px}.restartBtn{border:0;border-radius:20px;background:linear-gradient(#fff3a0,#ffc400,#ff8a00);padding:18px 48px;font-size:24px;font-weight:900;cursor:pointer;box-shadow:0 8px 0 #8a4d00,0 0 24px rgba(255,210,0,.6)}@keyframes endPop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}.audiencePage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.audCard{width:min(560px,94vw);padding:28px;border-radius:30px;background:linear-gradient(180deg,rgba(7,16,140,.75),rgba(5,0,39,.85));border:1px solid rgba(38,246,255,.45);box-shadow:0 18px 40px rgba(0,0,0,.35)}.audCard h1{text-align:center;margin-bottom:18px}.audCard input,.audCard textarea{width:100%;border:0;border-radius:16px;padding:14px 16px;margin:8px 0 12px;font-size:18px}.audCard textarea{height:130px;resize:none}.audBtn{width:100%;padding:15px;font-size:20px;margin-top:4px}.audBtn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(1)}.audStatus{text-align:center;margin-top:10px;font-weight:900;color:#ffd76a}.audHint{text-align:center;color:#aefcff;margin-top:12px;font-size:14px}
@keyframes xPop{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}@keyframes pop{from{transform:translateX(-12px);opacity:0}to{transform:none;opacity:1}}@keyframes correctPulse{from{transform:scale(1)}to{transform:scale(1.018)}}@keyframes fall{to{transform:translate3d(0,110vh,0) rotate(540deg);opacity:.85}}
@media(max-width:1100px){.main{grid-template-columns:220px 1fr 220px}.answer{height:190px}.logo{width:280px}.question{width:95%}}



/* ===== TV SHOW EXTRA ANIMÁCIÓK / VÉGSŐ LÁTVÁNY ===== */
body:before{
  content:"";
  position:fixed;
  inset:-20%;
  z-index:0;
  pointer-events:none;
  background:
    conic-gradient(from 0deg at 50% 15%, transparent 0 10deg, rgba(38,246,255,.16) 18deg, transparent 32deg, transparent 55deg, rgba(255,215,106,.12) 70deg, transparent 88deg),
    radial-gradient(circle at 20% 20%, rgba(38,246,255,.20), transparent 24%),
    radial-gradient(circle at 80% 18%, rgba(255,215,106,.18), transparent 22%);
  animation:showLights 9s linear infinite;
  filter:blur(.2px);
}
.panel{
  animation:panelGlow 3.5s ease-in-out infinite alternate;
}
.logo{
  position:relative;
  overflow:hidden;
  animation:logoPulse 1.8s ease-in-out infinite alternate;
}
.logo:after{
  content:"";
  position:absolute;
  inset:-40%;
  background:linear-gradient(120deg, transparent 35%, rgba(255,255,255,.72) 48%, transparent 62%);
  transform:translateX(-80%) rotate(10deg);
  animation:shine 2.6s ease-in-out infinite;
}
.question{
  animation:questionFloat 2.6s ease-in-out infinite alternate;
}
.answer{
  animation:answerEnter .55s ease both, answerGlow 2.5s ease-in-out infinite alternate;
}
.answer:nth-child(1){animation-delay:.04s}
.answer:nth-child(2){animation-delay:.12s}
.answer:nth-child(3){animation-delay:.20s}
.answer:nth-child(4){animation-delay:.28s}
.amount{
  animation:moneyPulse 1.8s ease-in-out infinite alternate;
}
.okBtn{
  animation:okPulse 1.4s ease-in-out infinite alternate;
}
.msg{
  border:1px solid rgba(255,255,255,.55);
  animation:chatPop .28s ease, chatGlow 2.6s ease-in-out infinite alternate;
}
.part{
  animation:helpPulse 2.4s ease-in-out infinite alternate;
}
.part:nth-child(2){animation-delay:.2s}
.part:nth-child(3){animation-delay:.4s}
.part:nth-child(4){animation-delay:.6s}
.bundle{
  animation:cashDance 1.4s ease-in-out infinite alternate;
}
.bundle:nth-child(2n){animation-delay:.18s}
.bundle:nth-child(3n){animation-delay:.32s}
@keyframes showLights{
  from{transform:rotate(0deg) scale(1.05)}
  to{transform:rotate(360deg) scale(1.05)}
}
@keyframes panelGlow{
  from{box-shadow:0 12px 28px rgba(0,0,0,.28),inset 0 0 14px rgba(255,255,255,.05),0 0 0 rgba(38,246,255,0)}
  to{box-shadow:0 16px 34px rgba(0,0,0,.34),inset 0 0 20px rgba(255,255,255,.08),0 0 26px rgba(38,246,255,.18)}
}
@keyframes logoPulse{
  from{transform:scale(1);box-shadow:0 0 24px rgba(255,215,0,.8)}
  to{transform:scale(1.035);box-shadow:0 0 42px rgba(255,215,0,1),0 0 22px rgba(255,255,255,.55)}
}
@keyframes shine{
  0%,35%{transform:translateX(-85%) rotate(10deg)}
  70%,100%{transform:translateX(85%) rotate(10deg)}
}
@keyframes questionFloat{
  from{transform:translateY(0)}
  to{transform:translateY(-5px)}
}
@keyframes answerEnter{
  from{opacity:0;transform:translateY(22px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes answerGlow{
  from{box-shadow:0 12px 24px rgba(0,0,0,.30),inset 0 0 16px rgba(255,255,255,.45)}
  to{box-shadow:0 18px 34px rgba(0,0,0,.34),inset 0 0 24px rgba(255,255,255,.62),0 0 22px rgba(38,246,255,.26)}
}
@keyframes moneyPulse{
  from{filter:brightness(1)}
  to{filter:brightness(1.16);transform:scale(1.04)}
}
@keyframes okPulse{
  from{filter:brightness(1)}
  to{filter:brightness(1.18);box-shadow:0 6px 0 #8a4d00,0 0 24px rgba(255,215,0,.72)}
}
@keyframes chatPop{
  from{opacity:0;transform:translateX(-18px) scale(.96)}
  to{opacity:1;transform:none}
}
@keyframes chatGlow{
  from{box-shadow:0 6px 12px rgba(0,0,0,.22)}
  to{box-shadow:0 8px 18px rgba(0,0,0,.28),0 0 14px rgba(38,246,255,.28)}
}
@keyframes helpPulse{
  from{filter:brightness(1)}
  to{filter:brightness(1.18)}
}
@keyframes cashDance{
  from{transform:translateY(0) rotate(-2deg)}
  to{transform:translateY(-4px) rotate(3deg)}
}

.adminResetBtn{

<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<div class="adminResetBtn" title="" onclick="adminReset()"></div>
<script>
function adminReset(){
  const p=prompt("Admin jelszó:");
  if(p==="admin123"){
    localStorage.removeItem("audienceMessageCount50M");
    localStorage.removeItem("lastAudienceMsg");
    alert("Chat resetelve! Újra tudnak üzenetet küldeni.");
    location.reload();
  }else if(p!==null){
    alert("Hibás jelszó!");
  }
}
</script>
<script>
const isAudience=new URLSearchParams(location.search).has('audience');
const app=document.getElementById('app');
const seenMessages=new Set();
function getGameState(){try{return JSON.parse(localStorage.getItem('gameState50M')||'{}')}catch(e){return {}}}
function setGameState(data){try{localStorage.setItem('gameState50M',JSON.stringify({...getGameState(),...data,updated:Date.now()}));}catch(e){}}
const AUDIENCE_LIMIT=10;
const CHAT_RESET_PASSWORD='admin123';
function getAudienceCount(){return Number(localStorage.getItem('audienceMessageCount50M')||0)}
function setAudienceCount(n){localStorage.setItem('audienceMessageCount50M',String(n))}

// Socket.io csatlakozás
const socket = io();

function sendChat(name,text){
  const state=getGameState();
  if(state.chatLocked)return {ok:false,reason:'locked'};
  const count=getAudienceCount();
  if(count>=AUDIENCE_LIMIT)return {ok:false,reason:'limit'};
  const msg={id:Date.now()+'-'+Math.random().toString(16).slice(2),name:name||'Néző',text:text||'',time:new Date().toLocaleTimeString('hu-HU',{hour:'2-digit',minute:'2-digit'})};
  setAudienceCount(count+1);
  socket.emit('send_message', msg);
  return {ok:true,count:count+1};
}
function showToast(t){const el=document.getElementById('toast');if(!el)return;el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}
if(isAudience){
  app.innerHTML=`<div class="audiencePage"><div class="audCard"><h1>💬 Közönség üzenőfal</h1><input id="audName" placeholder="Neved"><textarea id="audText" placeholder="Mit üzensz a játékosnak?"></textarea><button id="audSendBtn" class="audBtn" onclick="audSend()">ÜZENET KÜLDÉSE</button><div id="audStatus" class="audStatus"></div><div class="audHint">Egy néző összesen 10 üzenetet küldhet erről az eszközről. Ha a kérdésre már válaszoltak, új üzenet nem küldhető.</div></div></div><button class="adminResetBtn" title="Admin reset" onclick="adminResetChat()">•</button>`;
  window.adminResetChat=function(){const pw=prompt('Admin jelszó:');if(pw!==CHAT_RESET_PASSWORD){if(pw!==null)alert('Hibás jelszó!');return;}localStorage.removeItem('audienceMessageCount50M');socket.emit('reset_chat');updateAudienceStatus();alert('Chat limit resetelve! Újra lehet üzenetet küldeni.');}
  function updateAudienceStatus(){const left=Math.max(0,AUDIENCE_LIMIT-getAudienceCount());const btn=document.getElementById('audSendBtn');const st=document.getElementById('audStatus');st.textContent=left>0?'Hátralévő üzenetek: '+left+' / '+AUDIENCE_LIMIT:'Elküldted mind a 10 üzenetedet.';btn.disabled=left<=0;}
  window.audSend=function(){const n=document.getElementById('audName').value.trim();const t=document.getElementById('audText').value.trim();if(!t)return alert('Írj be egy üzenetet!');const res=sendChat(n,t);if(!res.ok){updateAudienceStatus();return alert(res.reason==='limit'?'Már elküldted a 10 üzenetedet, többet nem küldhetsz.':'Erre a kérdésre már válaszoltak, most nem lehet üzenetet küldeni.');}document.getElementById('audText').value='';updateAudienceStatus();showToast('Elküldve a műsor falára!')}

const answerEls=()=>document.querySelectorAll('.answer'); const partEls=()=>document.querySelectorAll('.part'); const bankEl=document.getElementById('bank');
function cashHtml(n){if(n<=0)return '<span style="opacity:.35">💵</span>';let stacks=Math.min(6,Math.max(1,Math.ceil(n/8)));return Array.from({length:stacks},()=>`<span class="bundle">💵</span>`).join('')}
window.add=function(i){if(checking||bank<=0||answerEls()[i].classList.contains('hiddenAnswer'))return;bank--;placed[i]++;update()}
window.sub=function(i){if(checking||placed[i]<=0)return;placed[i]--;bank++;update()}
function update(){bankEl.textContent=bank+'M';document.querySelectorAll('.amount').forEach((e,i)=>e.textContent=placed[i]+'M');document.querySelectorAll('.cash').forEach((e,i)=>e.innerHTML=cashHtml(placed[i]))}
function load(){checking=false;gameEnded=false;setGameState({chatLocked:false,currentQuestion:current});chickenIndex=null;document.querySelector('.center').classList.remove('locked');let q=questions[current];question.textContent=q.q;answerEls().forEach((a,i)=>{a.className='answer';a.style='';a.querySelector('h2').textContent=q.a[i];const b=a.querySelector('.chickenBadge');if(b)b.remove()});render();update()}
window.check=function(){if(checking||gameEnded)return;if(bank!==0)return alert('Minden pénzt fel kell használni!');checking=true;setGameState({chatLocked:true,currentQuestion:current});document.querySelector('.center').classList.add('locked');let q=questions[current];let roundTotal=placed.reduce((a,b)=>a+b,0);let survive=placed[q.correct];if(chickenIndex!==null&&chickenIndex!==q.correct)survive+=placed[chickenIndex];results[current]=survive>0;answerEls().forEach((a,i)=>{a.classList.remove('hiddenAnswer','lostMoney');a.style.opacity='';if(i===q.correct)a.classList.add('correct');else a.classList.add('wrong');if(placed[i]>0&&i!==q.correct&&i!==chickenIndex)a.classList.add('lostMoney')});if(survive>roundTotal/2)confetti();showToast('Megmaradt pénz: '+survive+'M');render();setTimeout(()=>{bank=survive;placed=[0,0,0,0];current++;if(current<questions.length&&bank>0)load();else endGame(bank>0)},3500)}
function render(){list.innerHTML='';let s=Math.max(0,current-4);for(let i=s;i<s+5&&i<questions.length;i++){let d=document.createElement('div');d.className='q future';if(i===current)d.className='q current';if(i<current)d.className=results[i]?'q green':'q red';d.textContent='Kérdés '+(i+1);list.appendChild(d)}}
function endGame(won){gameEnded=true;setGameState({chatLocked:true,gameEnded:true});question.textContent=won?'Vége a játéknak! Nyeremény: '+bank+'M':'Elveszett az összes pénz!';document.querySelector('.center').classList.add('locked');answerEls().forEach(a=>{a.className='answer';a.style.opacity=.35});update();render();showEndOverlay(won)}
function showEndOverlay(won){

  overlay.className='endOverlay';
  overlay.innerHTML=`<div class="endCard ${won?'won':'lost'}"><h1>${won?'GRATULÁLOK!':'VESZTETTÉL!'}</h1><p>${won?'Nyereményed: '+bank+'M':'Elfogyott az összes pénzed.'}</p><button class="restartBtn" onclick="restartGame()">ÚJRA</button></div>`;
  document.body.appendChild(overlay);
  if(won){ winnerMoneyParty(); setTimeout(winnerFireworks,1200); }
}

window.half=function(){if(checking||usedHelp.half)return;markHelpUsed('half',0);let q=questions[current],removed=0;answerEls().forEach((a,i)=>{if(i!==q.correct&&removed<2){a.classList.add('hiddenAnswer');removed++}});showToast('Felezés aktiválva - egyszer használható')}
window.phone=function(){if(checking||usedHelp.phone)return;markHelpUsed('phone',1);showToast('Telefon: szerintem '+questions[current].a[questions[current].correct]+' a jó válasz')}
window.chicken=function(){if(checking||usedHelp.chicken)return;markHelpUsed('chicken',2);let q=questions[current];let choices=[q.correct,...[0,1,2,3].filter(i=>i!==q.correct)];chickenIndex=choices[Math.random()<.75?0:Math.floor(Math.random()*choices.length)];let a=answerEls()[chickenIndex];a.classList.add('chickenPick');a.insertAdjacentHTML('beforeend','<div class="chickenBadge">🐔</div>');showToast('A csirkén lévő pénz is továbbmegy!')}

navigator.clipboard?.writeText(link);

}
function addMsg(msg){if(!msg)return;if(msg.id&&seenMessages.has(msg.id))return;if(msg.id)seenMessages.add(msg.id);const wall=document.getElementById('chatWall');const div=document.createElement('div');div.className='msg';div.innerHTML=`<b>${escapeHtml(msg.name||'Néző')}</b><p>${escapeHtml(msg.text||'')}</p><small>${msg.time||''}</small>`;wall.prepend(div);while(wall.children.length>35)wall.lastChild.remove()}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

socket.on('receive_message', (msg) => { addMsg(msg); });
socket.on('init_messages', (messages) => {
  messages.forEach(m => addMsg(m));
});
socket.on('chat_reset', () => {
  seenMessages.clear();
  const wall=document.getElementById('chatWall');
  if(wall)wall.innerHTML='';
  showToast('Chat resetelve az admin által!');
});

}

function confetti(){const colors=['#ffd700','#26f6ff','#ff2d55','#10e26f','#ffffff','#ff9e2c'];for(let i=0;i<80;i++){let c=document.createElement('div');c.className='confetti';c.style.zIndex='999999';c.style.setProperty('--drift', ((Math.random()*180)-90)+'px');c.style.zIndex='99999';c.style.left=Math.random()*100+'vw';c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.animationDuration=(1.6+Math.random()*1.5)+'s';c.style.animationDelay=(Math.random()*.22)+'s';c.style.transform=`rotate(${Math.random()*360}deg)`;document.body.appendChild(c);setTimeout(()=>c.remove(),3400)}}
